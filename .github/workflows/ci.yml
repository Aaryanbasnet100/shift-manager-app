name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      # Info-level lints (deprecation notices etc.) shouldn't fail the build.
      - run: flutter analyze --no-fatal-infos
      - run: flutter test
